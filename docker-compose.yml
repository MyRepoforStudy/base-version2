services:
  db:
    image: postgres:16
    container_name: server_inventory_db
    environment:
      POSTGRES_DB: server_inventory
      POSTGRES_USER: server_inventory
      POSTGRES_PASSWORD: server_inventory
    volumes:
      - server_inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U server_inventory -d server_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-}"
    container_name: server_inventory_app
    environment:
      DATABASE_URL: postgresql+psycopg://server_inventory:server_inventory@db:5432/server_inventory
      APP_NAME: Linux Server Inventory
      APP_ENV: docker
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Almaty}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-admin-session-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ZABBIX_URL: ${ZABBIX_URL:-}
      ZABBIX_API_TOKEN: ${ZABBIX_API_TOKEN:-}
      ZABBIX_VERIFY_SSL: ${ZABBIX_VERIFY_SSL:-true}
      ZABBIX_CA_FILE: ${ZABBIX_CA_FILE:-}
      ZABBIX_HOST_GROUP: ${ZABBIX_HOST_GROUP:-Linux servers}
      ZABBIX_AUTO_REFRESH_SECONDS: ${ZABBIX_AUTO_REFRESH_SECONDS:-300}
      ZABBIX_COLLECT_INTERVAL_SECONDS: ${ZABBIX_COLLECT_INTERVAL_SECONDS:-300}
      ZABBIX_HISTORY_BACKFILL_DAYS: ${ZABBIX_HISTORY_BACKFILL_DAYS:-30}
      METRIC_HISTORY_INTERVAL_SECONDS: ${METRIC_HISTORY_INTERVAL_SECONDS:-3600}
      METRIC_HISTORY_RETENTION_DAYS: ${METRIC_HISTORY_RETENTION_DAYS:-90}
      SLA_TARGET_PERCENT: ${SLA_TARGET_PERCENT:-99.9}
      CAPACITY_FORECAST_TARGET_PERCENT: ${CAPACITY_FORECAST_TARGET_PERCENT:-95}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  server_inventory_pgdata:
